<style>

#overall-container {
    display: flex;
    background-color: #eeeeee;
}

#left-section {
    width: 50%;
    display: flex;
    background-color: #eeee88;
    height: 150px;
}

#middle-section {
    width: 40%;
    display: flex;
    background-color: #88eeee;
}

#right-section {
    position: relative;
    width: 10%;
    display: flex;
    grid-gap: 4px;
    flex-direction: column;
    background-color: #ee88ee;
}

#primary-pile {
    margin-top: 5%;
    background-color: #abcdef;
}

#endgame-pile {
    background-color: #fedcba;
    top: 45%;
}

.pile {
    position: relative;
    display: block;
}

.pile > .tile { position: absolute; display: inline-block; }

.pile > .tile:nth-child(1) { left: 2%; margin-top: 2%; }
.pile > .tile:nth-child(2) { left: 4%; margin-top: 4%; }
.pile > .tile:nth-child(3) { left: 6%; margin-top: 6%; }
.pile > .tile:nth-child(4) { left: 8%; margin-top: 8%; }
.pile > .tile:nth-child(5) { left: 10%; margin-top: 10%; }

span.tile {
    display: flex;
    position: absolute;
    width: 35%;
    padding-bottom: 35%;
    margin-left: 25%;
}

/* non-essential demo styles */
.pile > .tile:nth-child(1) { background-color: lightgreen; }
.pile > .tile:nth-child(2) { background-color: orange; }
.pile > .tile:nth-child(3) { background-color: aqua; }
.pile > .tile:nth-child(4) { background-color: darkgreen; }
.pile > .tile:nth-child(5) { background-color: yellow; }

</style>

<html>
  <body>
    <div id="overall-container">
      <div id="left-section"></div>
      <div id="middle-section"></div>
      <div id="right-section">
        <div id="primary-pile" class="pile">
          <span class="tile"></span>
          <span class="tile"></span>
          <span class="tile"></span>
          <span class="tile"></span>
          <span class="tile"></span>
        </div>
        <div id="endgame-pile" class="pile">
          <span class="tile"></span>
          <span class="tile"></span>
          <span class="tile"></span>
        </div>
      </div>
    </div>
  </body>
</html>
