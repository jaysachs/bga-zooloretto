<style>

#overall-container {
    display-flex;
    flex-direction: column;
}

#lower-portion {
    background-color: #65efb9;
    height: 50vw;
}

#upper-portion {
    padding: 1%;
    display: flex;
    background-color: #eeeeee;

    /* seems irrelevant: */
    position: relative;
}

#trucks {
    width: 70%;
    display: flex;
    justify-content: space-evenly;

    background-color: #eeee88;
    /* position:relative;*/
}

/* truck spaces */
.truck > div {
    position: relative;
    width: 5.0vw;
    height: 5.0vw;
    top: 12%;
}
.truck > div:nth-child(1) {
    left: 5%;
}
.truck > div:nth-child(2) {
    left: 10%;
}
.truck > div:nth-child(3) {
    left: 15%;
}


.truck {
    display: flex;
    background-size: contain;
    background-repeat: no-repeat;
    background-image: url('../img/Wagon3.png');
    width: 18.92vw;
    height: 7vw;
}


#middle-section {
    width: 10%;
    display: flex;
    background-color: #88eeee;
    justify-content: center;
    align-items: center;
}

.tile-container {
    width: 5.0vw;
    height: 5.0vw;
}

#drawn-tile {
    border-radius: 5% 5%;
    border: yellow 0.2vw dashed;
}

#right-section {
    width: 20%;
    display: flex;
/*    grid-gap: 4px; */
    flex-direction: row;
    background-color: #ee88ee;
}

.pile {
    position: relative;
}

.pile > span {
    position: absolute;
    width: 5.0vw;
    height: 5.0vw;
}

.pile > span:nth-child(1) { left: 0; top: 0; }
.pile > span:nth-child(2) { left: 0.5vw; top: 0.5vw; }
.pile > span:nth-child(3) { left: 1.0vw; top: 1.0vw; }
.pile > span:nth-child(4) { left: 1.5vw; top: 1.5vw; }
.pile > span:nth-child(5) { left: 2.0vw; margin-top: 2.0vw; }

.tileBack {
    /* may not be in a tile container */
    width: 5.0vw;
    height: 5.0vw;

    /* these 6 shared with tile */
    border-radius: 5% 5%;
    border: 0 solid;
    /* this sort of makes sense */
    display: inline-block;
    width: 100%;
    height: 100%;
    filter: drop-shadow(0.1vw 0.2vw #573404) drop-shadow(0.1vw 0.1vw #573404) drop-shadow(0.1vw 0.1vw #573404);

    /* differ from tile */
    background-size: contain;
    backgorund-repeat: no-repeat;
    background-image: url('../img/Back.png');
}

.tile {
    /* round the corners */
    border-radius: 5% 5%;
    border: 0 solid;

    /* this sort of makes sense */
    display: inline-block;
    width: 100%;
    height: 100%;

    filter: drop-shadow(0.1vw 0.2vw #573404) drop-shadow(0.1vw 0.1vw #573404) drop-shadow(0.1vw 0.1vw #573404);
    background-image: url('../img/Tiles.png');
    /* basically corresponds to number of columns in the sprite */
    background-size: 600% 600%;

/*    background-position: 20% 80%;*/
}

.tileStallA
{
    background-position: 40% 100%;
}


/* non-essential demo styles */
span:nth-child(1) { background-color: lightgreen; }
span:nth-child(2) { background-color: orange; }
span:nth-child(3) { background-color: aqua; }
span:nth-child(4) { background-color: darkgreen; }
span:nth-child(5) { background-color: yellow; }

</style>

<html>
  <body>
    <div id="overall-container">

      <div id="upper-portion">
        <div id="trucks">
          <div id="truck1" class="truck">
            <div id="truckspace1_1">
              <span class="tile tileCF"></span>
            </div>
            <div id="truckspace1_2">
              <span class="tile tileStallA"></span>
            </div>
            <div id="truckspace1_3">
              <span class="tile tileCF"></span>
            </div>
          </div>

          <div id="truck2" class="truck">
            <div id="truckspace1_1">
            </div>
            <div id="truckspace1_2">
            </div>
            <div id="truckspace1_3">
            </div>
          </div>

          <div id="truck3" class="truck">
            <div id="truckspace1_1">
            </div>
            <div id="truckspace1_2">
            </div>
            <div id="truckspace1_3">
            </div>
          </div>

        </div>

        <div id="middle-section">
          <div id="drawn-tile" class="tile-container">
            <span class="tile tileStallA"></span>
          </div>
        </div>

        <div id="right-section">
          <div id="primary-pile" class="pile">
            <span class="tileBack"></span>
            <span class="tileBack"></span>
            <span class="tileBack"></span>
          </div>
          <div id="endgame-pile" class="pile">
            <span class="tileBack"></span>
            <span class="tileBack"></span>
            <span class="tileBack"></span>
            <span class="tileBack"></span>
            <span class="tileBack"></span>
          </div>
        </div>
      </div>

      <div id="lower-portion">
      </div>

    </div>
  </body>
</html>
