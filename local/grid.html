<style>

#overall-container {
    display: flex;
    background-color: #eeeeee;


    /* seems irrelevant: */
    position: relative;
}

#left-section {
    width: 50%;
    display: flex;
    background-color: #eeee88;
    height: 150px;
}

#middle-section {
    width: 40%;
    display: flex;
    background-color: #88eeee;
}

#right-section {
    position: relative;
    width: 10%;
    display: flex;
    grid-gap: 4px;
    flex-direction: column;
    background-color: #ee88ee;
}

#primary-pile {
    margin-top: 5%;
    position: relative;
    display: block;
}

#endgame-pile {
    top: 45%;
    position: relative;
    display: block;
}

#primary-pile > span {
    display: flex;
    position: absolute;
    width: 40%;
    padding-bottom: 40%;
    margin-left: 25%;
}

#endgame-pile > span {
    display: flex;
    position: absolute;
    width: 40%;
    padding-bottom: 40%;
    margin-left: 25%;
}

#primary-pile > span:nth-child(1) { left: 2%; margin-top: 2%; }
#primary-pile > span:nth-child(2) { left: 4%; margin-top: 4%; }
#primary-pile > span:nth-child(3) { left: 6%; margin-top: 6%; }
#primary-pile > span:nth-child(4) { left: 8%; margin-top: 8%; }
#primary-pile > span:nth-child(5) { left: 10%; margin-top: 10%; }

#endgame-pile > span:nth-child(1) { left: 2%; margin-top: 2%; }
#endgame-pile > span:nth-child(2) { left: 4%; margin-top: 4%; }
#endgame-pile > span:nth-child(3) { left: 6%; margin-top: 6%; }
#endgame-pile > span:nth-child(4) { left: 8%; margin-top: 8%; }
#endgame-pile > span:nth-child(5) { left: 10%; margin-top: 10%; }

/* non-essential demo styles */
span:nth-child(1) { background-color: lightgreen; }
span:nth-child(2) { background-color: orange; }
span:nth-child(3) { background-color: aqua; }
span:nth-child(4) { background-color: darkgreen; }
span:nth-child(5) { background-color: yellow; }

</style>

<html>
  <body>
    <div id="overall-container">
      <div id="left-section"></div>
      <div id="middle-section"></div>
      <div id="right-section">
        <div id="primary-pile">
          <span class="tile"></span>
          <span class="tile"></span>
          <span class="tile"></span>
          <span class="tile"></span>
          <span class="tile"></span>
        </div>
        <div id="endgame-pile">
          <span class="tile"></span>
          <span class="tile"></span>
          <span class="tile"></span>
        </div>
      </div>
    </div>
  </body>
</html>
